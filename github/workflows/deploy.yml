# Auto-deploys the itinerary to GitHub Pages on every push to main.
# Set up once: Repo → Settings → Pages → Source = "GitHub Actions".
name: Deploy itinerary

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger a manual rebuild from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer pushes cancel older in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # repo root is the site (index.html lives here)
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
